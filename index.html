<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>QUEEN'S FRAME - Personal Studio Experience 👑</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Plus+Jakarta+Sans:wght@300;400;600;800&family=Cinzel:wght@400;700;900&family=Great+Vibes&family=UnifrakturMaguntia&family=Montserrat:wght@300;600&family=Bebas+Neue&family=Cherry+Bomb+One&display=swap" rel="stylesheet">
    <style>
        /* Base Transition */
        * { transition: background-color 0.8s cubic-bezier(0.4, 0, 0.2, 1), color 0.5s ease, border-color 0.5s ease, box-shadow 0.5s ease; }

        :root {
            --primary-bg: #0a0a0a;
            --panel-bg: rgba(255, 255, 255, 0.03);
            --accent-color: #d4af37;
            --text-main: #ffffff;
            --font-logo: 'Cinzel', serif;
        }

        body {
            background-color: var(--primary-bg);
            color: var(--text-main);
            font-family: 'Plus Jakarta Sans', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
            background-image: radial-gradient(circle at top right, rgba(255,255,255,0.05), transparent);
        }

        .glass-panel {
            background: var(--panel-bg);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 1.5rem;
        }

        .gold-gradient-text {
            background: linear-gradient(to bottom, #fcf6ba 0%, #bf953f 22%, #fbf5b7 45%, #aa771c 50%, #fcf6ba 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Camera Box & Filter Effects */
        #camera-wrapper {
            position: relative;
            width: 100%;
            max-width: 640px;
            aspect-ratio: 4 / 3;
            background: #000;
            border: 8px solid var(--accent-color);
            border-radius: 4px;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        video { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            transform: scaleX(-1); 
            filter: var(--current-filter, none);
        }

        /* Filter Presets */
        .filter-soft-pink { --current-filter: brightness(1.1) contrast(0.9) saturate(1.1) sepia(0.2) hue-rotate(-15deg); }
        .filter-vintage { --current-filter: sepia(0.6) contrast(1.1) brightness(0.9); }
        .filter-cold { --current-filter: saturate(0.5) hue-rotate(180deg) brightness(1.1); }
        .filter-warm { --current-filter: sepia(0.3) saturate(1.4) contrast(0.9); }
        .filter-noir { --current-filter: grayscale(1) contrast(1.2); }

        /* Theme & Filter Buttons */
        .theme-pill {
            width: 100%;
            padding: 12px;
            border-radius: 14px;
            cursor: pointer;
            border: 2px solid transparent;
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 10px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            background: rgba(0,0,0,0.2);
        }
        .theme-pill:hover { transform: translateX(8px); background: rgba(255,255,255,0.05); }
        .theme-pill.active { border-color: var(--accent-color); background: rgba(255,255,255,0.1); }

        .filter-pill {
            padding: 8px 16px;
            border-radius: 50px;
            font-size: 9px;
            font-weight: 800;
            cursor: pointer;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .filter-pill.active {
            background: var(--accent-color);
            color: #000;
            border-color: transparent;
        }

        .dot { width: 14px; height: 14px; border-radius: 4px; }

        /* Strip Design */
        #strip-preview {
            width: 200px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.4);
            transition: 0.5s;
        }

        .slot { width: 100%; aspect-ratio: 4 / 3; background: rgba(0,0,0,0.1); overflow: hidden; }
        .slot img { width: 100%; height: 100%; object-fit: cover; }

        .btn-capture {
            background: var(--accent-color);
            color: #000;
            font-family: var(--font-logo);
            font-weight: 900;
            padding: 1.25rem;
            border-radius: 100px;
            letter-spacing: 3px;
            box-shadow: 0 10px 20px -5px var(--accent-color);
        }
        .btn-capture:hover { transform: translateY(-3px) scale(1.02); filter: brightness(1.1); }

        .flash-fx {
            position: absolute; inset: 0; background: white; opacity: 0; z-index: 100; pointer-events: none;
        }
        .flash-active { animation: flash-play 0.5s ease-out; }
        @keyframes flash-play { 0% { opacity: 0; } 50% { opacity: 1; } 100% { opacity: 0; } }

        /* Scrollbar */
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: var(--accent-color); border-radius: 10px; }
    </style>
</head>
<body class="p-4 md:p-8">
    
    <div class="max-w-7xl mx-auto">
        <!-- Header -->
        <header class="flex flex-col md:flex-row justify-between items-center mb-10 gap-6">
            <div class="text-center md:text-left">
                <h1 id="web-logo" class="text-5xl md:text-7xl font-black tracking-tighter" style="font-family: var(--font-logo);">QUEEN'S FRAME</h1>
                <p id="web-tagline" class="text-[10px] tracking-[0.6em] uppercase opacity-50 mt-2">Personalized High-End Studio Experience</p>
            </div>
            
            <div class="flex gap-4">
                <div class="glass-panel px-6 py-3 flex items-center gap-4">
                    <span class="text-[10px] font-bold opacity-50">STUDIO MODE</span>
                    <span id="active-mode-display" class="flex items-center gap-2 text-[10px] font-black uppercase tracking-widest"><span class="w-2 h-2 bg-green-500 rounded-full"></span> CUSTOMIZING</span>
                </div>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            
            <!-- Left Panel: Dual Theme Selectors -->
            <aside class="lg:col-span-3 space-y-6 order-2 lg:order-1">
                <div class="glass-panel p-5">
                    <h3 class="text-[10px] font-black tracking-widest uppercase mb-4 opacity-60">1. Website Atmosphere</h3>
                    <div class="space-y-2 max-h-[250px] overflow-y-auto custom-scroll pr-2" id="web-theme-list"></div>
                </div>

                <div class="glass-panel p-5">
                    <h3 class="text-[10px] font-black tracking-widest uppercase mb-4 opacity-60">2. Photo Strip Design</h3>
                    <div class="space-y-2 max-h-[250px] overflow-y-auto custom-scroll pr-2" id="strip-theme-list"></div>
                </div>
            </aside>

            <!-- Center Panel: Camera & Filters -->
            <main class="lg:col-span-6 flex flex-col items-center order-1 lg:order-2">
                <div id="camera-wrapper">
                    <div id="flash" class="flash-fx"></div>
                    <div id="countdown" class="absolute inset-0 flex items-center justify-center text-white text-9xl font-black z-50 hidden" style="text-shadow: 0 0 30px rgba(0,0,0,0.5);">3</div>
                    <video id="video-feed" autoplay playsinline></video>
                    <div id="sticker-canvas" class="absolute inset-0 pointer-events-none"></div>
                </div>

                <!-- Camera Filters -->
                <div class="mt-6 flex flex-wrap justify-center gap-2">
                    <button onclick="applyFilter('none', this)" class="filter-pill active">Natural</button>
                    <button onclick="applyFilter('soft-pink', this)" class="filter-pill">Soft Pink</button>
                    <button onclick="applyFilter('vintage', this)" class="filter-pill">Vintage</button>
                    <button onclick="applyFilter('warm', this)" class="filter-pill">Sunlight</button>
                    <button onclick="applyFilter('cold', this)" class="filter-pill">Cold Blue</button>
                    <button onclick="applyFilter('noir', this)" class="filter-pill">Noir</button>
                </div>

                <div class="w-full max-w-md mt-8 flex flex-col gap-4">
                    <button onclick="startSession()" class="btn-capture w-full group overflow-hidden relative">
                        <span class="relative z-10">START SESSION</span>
                    </button>
                    
                    <div class="flex justify-center gap-6 glass-panel py-3 px-6">
                        <button onclick="addEmoji('✨')" class="text-2xl hover:scale-125 transition">✨</button>
                        <button onclick="addEmoji('🎀')" class="text-2xl hover:scale-125 transition">🎀</button>
                        <button onclick="addEmoji('🖤')" class="text-2xl hover:scale-125 transition">🖤</button>
                        <button onclick="addEmoji('🍒')" class="text-2xl hover:scale-125 transition">🍒</button>
                        <button onclick="addEmoji('💄')" class="text-2xl hover:scale-125 transition">💄</button>
                    </div>
                </div>
            </main>

            <!-- Right Panel: Result Strip -->
            <aside class="lg:col-span-3 flex flex-col items-center order-3">
                <div class="glass-panel p-6">
                    <h3 class="text-center text-[10px] font-black tracking-widest uppercase mb-6 opacity-60">Live Preview</h3>
                    
                    <div id="strip-preview">
                        <div class="slot" id="frame-0"></div>
                        <div class="slot" id="frame-1"></div>
                        <div class="slot" id="frame-2"></div>
                        <div class="slot" id="frame-3"></div>
                        
                        <div class="mt-4 text-center pt-4 pb-2 border-t border-white/10" id="strip-footer">
                            <h2 id="strip-title" class="text-xl font-bold tracking-tighter">QUEEN'S FRAME</h2>
                            <p id="strip-tag" class="text-[7px] tracking-[0.3em] uppercase opacity-60">Luxury Collective Studio</p>
                        </div>
                    </div>

                    <button id="download-trigger" onclick="generateFinalStrip()" class="hidden mt-6 w-full py-4 bg-white text-black font-black text-[10px] tracking-widest uppercase rounded-xl hover:scale-105 transition-all shadow-2xl">Save Masterpiece</button>
                </div>
            </aside>
        </div>
    </div>

    <canvas id="working-canvas" class="hidden"></canvas>

    <script>
        // 10 Website Themes
        const webThemes = [
            { id: 'web-maroon', name: 'Sangar Maroon', bg: '#2d0000', panel: 'rgba(255,255,255,0.05)', accent: '#d4af37', text: '#ffffff', font: 'Cinzel' },
            { id: 'web-dark', name: 'Gothic Noir', bg: '#050505', panel: 'rgba(255,255,255,0.02)', accent: '#888888', text: '#ffffff', font: 'UnifrakturMaguntia' },
            { id: 'web-navy', name: 'Midnight Navy', bg: '#000814', panel: 'rgba(255,255,255,0.05)', accent: '#bf953f', text: '#ffffff', font: 'Cinzel' },
            { id: 'web-coquette', name: 'Cute Coquette', bg: '#fff0f3', panel: 'rgba(255,143,171,0.1)', accent: '#ff8fab', text: '#ff5c8d', font: 'Great Vibes' },
            { id: 'web-matcha', name: 'Zen Matcha', bg: '#f1f8e9', panel: 'rgba(51,105,30,0.05)', accent: '#558b2f', text: '#33691e', font: 'Montserrat' },
            { id: 'web-vintage', name: 'Warm Vintage', bg: '#fdfcf0', panel: 'rgba(93,64,55,0.05)', accent: '#8d6e63', text: '#5d4037', font: 'Playfair Display' },
            { id: 'web-sunset', name: 'Bold Sunset', bg: '#fff7ed', panel: 'rgba(234,88,12,0.1)', accent: '#ea580c', text: '#7c2d12', font: 'Bebas Neue' },
            { id: 'web-red', name: 'Classic Red', bg: '#450a0a', panel: 'rgba(255,255,255,0.05)', accent: '#f87171', text: '#ffffff', font: 'Cinzel' },
            { id: 'web-sky', name: 'Dreamy Sky', bg: '#f0f9ff', panel: 'rgba(14,165,233,0.1)', accent: '#0284c7', text: '#0369a1', font: 'Montserrat' },
            { id: 'web-white', name: 'Minimal White', bg: '#fafafa', panel: 'rgba(0,0,0,0.03)', accent: '#1a1a1a', text: '#111111', font: 'Plus Jakarta Sans' }
        ];

        // 10 Strip Themes
        const stripThemes = [
            { id: 'str-vintage', name: 'Vintage Paper', bg: '#f4ecd8', text: '#5d4037', font: 'Playfair Display' },
            { id: 'str-coquette', name: 'Pink Ribbon', bg: '#ffe5ec', text: '#ff8fab', font: 'Great Vibes' },
            { id: 'str-maroon', name: 'Royal Maroon', bg: '#4a0000', text: '#ffffff', font: 'Cinzel' },
            { id: 'str-dark', name: 'Total Black', bg: '#000000', text: '#ffffff', font: 'UnifrakturMaguntia' },
            { id: 'str-matcha', name: 'Organic Matcha', bg: '#f1f8e9', text: '#33691e', font: 'Montserrat' },
            { id: 'str-sunset', name: 'Warm Orange', bg: '#ffedd5', text: '#ea580c', font: 'Bebas Neue' },
            { id: 'str-navy', name: 'Gold Navy', bg: '#001d3d', text: '#bf953f', font: 'Cinzel' },
            { id: 'str-cute', name: 'Sweet Candy', bg: '#fce4ec', text: '#ec4899', font: 'Cherry Bomb One' },
            { id: 'str-minimal', name: 'Modern White', bg: '#ffffff', text: '#000000', font: 'Plus Jakarta Sans' },
            { id: 'str-bold', name: 'Street Red', bg: '#d50000', text: '#ffffff', font: 'Bebas Neue' }
        ];

        let currentWeb = webThemes[0];
        let currentStrip = stripThemes[0];
        let currentFilter = 'none';
        let capturedPhotos = [];
        const video = document.getElementById('video-feed');
        const stickerCanvas = document.getElementById('sticker-canvas');

        // Setup
        async function init() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { width: { ideal: 1280 }, height: { ideal: 960 } } 
                });
                video.srcObject = stream;
            } catch (e) { console.error("Camera Error:", e); }
            
            renderWebThemes();
            renderStripThemes();
            applyWebTheme(webThemes[0]);
            applyStripTheme(stripThemes[0]);
        }

        function applyFilter(filterClass, btn) {
            currentFilter = filterClass;
            video.className = filterClass !== 'none' ? `filter-${filterClass}` : '';
            document.querySelectorAll('.filter-pill').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }

        function renderWebThemes() {
            const list = document.getElementById('web-theme-list');
            webThemes.forEach(t => {
                const btn = document.createElement('div');
                btn.id = `web-${t.id}`;
                btn.className = 'theme-pill';
                btn.innerHTML = `<span class="dot" style="background:${t.bg}"></span> <span>${t.name}</span>`;
                btn.onclick = () => applyWebTheme(t);
                list.appendChild(btn);
            });
        }

        function renderStripThemes() {
            const list = document.getElementById('strip-theme-list');
            stripThemes.forEach(t => {
                const btn = document.createElement('div');
                btn.id = `str-${t.id}`;
                btn.className = 'theme-pill';
                btn.innerHTML = `<span class="dot" style="background:${t.bg}"></span> <span>${t.name}</span>`;
                btn.onclick = () => applyStripTheme(t);
                list.appendChild(btn);
            });
        }

        function applyWebTheme(t) {
            currentWeb = t;
            document.body.style.backgroundColor = t.bg;
            document.body.style.color = t.text;
            
            document.querySelectorAll('.glass-panel').forEach(p => p.style.background = t.panel);
            document.querySelectorAll('#web-theme-list .theme-pill').forEach(p => p.classList.remove('active'));
            const activeBtn = document.getElementById(`web-${t.id}`);
            if(activeBtn) activeBtn.classList.add('active');

            const logo = document.getElementById('web-logo');
            logo.style.fontFamily = t.font;
            if(['web-maroon', 'web-navy', 'web-dark'].includes(t.id)) {
                logo.classList.add('gold-gradient-text');
            } else {
                logo.classList.remove('gold-gradient-text');
                logo.style.color = t.text;
            }

            const btn = document.querySelector('.btn-capture');
            btn.style.backgroundColor = t.accent;
            btn.style.color = (t.bg === '#fafafa' || t.bg === '#fff0f3' || t.bg === '#f1f8e9') ? '#000' : '#fff';
            btn.style.boxShadow = `0 10px 30px -5px ${t.accent}66`;

            document.getElementById('camera-wrapper').style.borderColor = t.accent;
            document.getElementById('active-mode-display').style.color = t.accent;
        }

        function applyStripTheme(t) {
            currentStrip = t;
            document.querySelectorAll('#strip-theme-list .theme-pill').forEach(p => p.classList.remove('active'));
            const activeBtn = document.getElementById(`str-${t.id}`);
            if(activeBtn) activeBtn.classList.add('active');

            const strip = document.getElementById('strip-preview');
            strip.style.backgroundColor = t.bg;
            
            const title = document.getElementById('strip-title');
            title.style.color = t.text;
            title.style.fontFamily = t.font;
            
            document.getElementById('strip-tag').style.color = t.text;
            document.getElementById('strip-footer').style.borderColor = `${t.text}22`;
        }

        function addEmoji(emoji) {
            const el = document.createElement('div');
            el.className = 'absolute text-5xl cursor-move pointer-events-auto select-none';
            el.innerText = emoji;
            el.style.left = '50%'; el.style.top = '50%';
            el.style.transform = 'translate(-50%, -50%)';

            let isDragging = false;
            el.onmousedown = () => isDragging = true;
            window.onmousemove = (e) => {
                if(!isDragging) return;
                const rect = document.getElementById('camera-wrapper').getBoundingClientRect();
                el.style.left = (e.clientX - rect.left) + 'px';
                el.style.top = (e.clientY - rect.top) + 'px';
            };
            window.onmouseup = () => isDragging = false;
            el.ondblclick = () => el.remove();
            stickerCanvas.appendChild(el);
        }

        async function startSession() {
            capturedPhotos = [];
            document.getElementById('download-trigger').classList.add('hidden');
            const counter = document.getElementById('countdown');

            for(let i=0; i<4; i++) {
                counter.classList.remove('hidden');
                for(let c=3; c>0; c--) {
                    counter.innerText = c;
                    await new Promise(r => setTimeout(r, 700));
                }
                counter.classList.add('hidden');
                
                document.getElementById('flash').classList.add('flash-active');
                captureFrame(i);
                setTimeout(() => document.getElementById('flash').classList.remove('flash-active'), 500);
                await new Promise(r => setTimeout(r, 1000));
            }
            document.getElementById('download-trigger').classList.remove('hidden');
        }

        function getFilterString(f) {
            switch(f) {
                case 'soft-pink': return "brightness(1.1) contrast(0.9) saturate(1.1) sepia(0.2) hue-rotate(-15deg)";
                case 'vintage': return "sepia(0.6) contrast(1.1) brightness(0.9)";
                case 'cold': return "saturate(0.5) hue-rotate(180deg) brightness(1.1)";
                case 'warm': return "sepia(0.3) saturate(1.4) contrast(0.9)";
                case 'noir': return "grayscale(1) contrast(1.2)";
                default: return "none";
            }
        }

        function captureFrame(index) {
            const canvas = document.getElementById('working-canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = 1200; canvas.height = 900;

            const vw = video.videoWidth;
            const vh = video.videoHeight;
            const targetRatio = 1200 / 900;
            const currentRatio = vw / vh;

            let sW, sH, sX, sY;
            if(currentRatio > targetRatio) {
                sH = vh; sW = vh * targetRatio;
                sX = (vw - sW) / 2; sY = 0;
            } else {
                sW = vw; sH = vw / targetRatio;
                sX = 0; sY = (vh - sH) / 2;
            }

            // Apply filter to canvas
            ctx.filter = getFilterString(currentFilter);

            ctx.save();
            ctx.scale(-1, 1);
            ctx.translate(-1200, 0);
            ctx.drawImage(video, sX, sY, sW, sH, 0, 0, 1200, 900);
            ctx.restore();

            // Draw Stickers
            ctx.filter = "none"; 
            const rect = document.getElementById('camera-wrapper').getBoundingClientRect();
            stickerCanvas.querySelectorAll('div').forEach(s => {
                const x = (parseFloat(s.style.left) / rect.width) * 1200;
                const y = (parseFloat(s.style.top) / rect.height) * 900;
                ctx.font = "80px serif";
                ctx.textAlign = "center";
                ctx.fillText(s.innerText, x, y);
            });

            const imgData = canvas.toDataURL('image/png');
            capturedPhotos.push(imgData);
            document.getElementById(`frame-${index}`).innerHTML = `<img src="${imgData}">`;
        }

        async function generateFinalStrip() {
            const final = document.createElement('canvas');
            const fctx = final.getContext('2d');
            final.width = 1200; final.height = 4500;

            fctx.fillStyle = currentStrip.bg;
            fctx.fillRect(0,0, final.width, final.height);

            const pad = 80;
            const iW = 1040;
            const iH = 780;

            for(let i=0; i<capturedPhotos.length; i++) {
                const img = new Image();
                img.src = capturedPhotos[i];
                await new Promise(r => img.onload = r);
                const y = pad + (i * (iH + 90));
                fctx.drawImage(img, pad, y, iW, iH);
            }

            const footerY = 4050;
            fctx.textAlign = "center";
            fctx.fillStyle = currentStrip.text;
            fctx.font = `bold 100px ${currentStrip.font}`;
            fctx.fillText("QUEEN'S FRAME", 600, footerY);
            
            fctx.font = "30px 'Montserrat'";
            fctx.globalAlpha = 0.5;
            fctx.letterSpacing = "15px";
            fctx.fillText("LUXURY COLLECTIVE STUDIO", 600, footerY + 110);

            const downloadLink = document.createElement('a');
            downloadLink.download = `QueensFrame_Masterpiece.png`;
            downloadLink.href = final.toDataURL('image/png');
            downloadLink.click();
        }

        window.onload = init;
    </script>
</body>
</html>
